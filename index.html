<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>
<body>
<p id="status">En attente...</p>
<button onclick="document.getElementById('status').textContent='JS fonctionne !'">Test JS</button>

<hr>

<p>Opérateur : <input id="op" type="text" placeholder="Votre identifiant"></p>
<button onclick="lancer()">Lancer l'extraction</button>
<p id="result"></p>

<script src="https://docs.getgrist.com/grist-plugin-api.js" onerror="console.warn('API Grist non chargée')"></script>
<script>
if (typeof grist === 'undefined') {
  window.grist = {
    ready: function() {},
    docApi: {
      fetchTable: async function(t) { throw new Error('API Grist non disponible'); },
      applyUserActions: async function() { throw new Error('API Grist non disponible'); },
    }
  };
}

grist.ready({ requiredAccess: 'full' });

async function lancer() {
  var op = document.getElementById('op').value.trim();
  var res = document.getElementById('result');

  if (!op) { res.textContent = 'Veuillez saisir un opérateur.'; return; }

  res.textContent = 'Lecture de ZGDU...';
  try {
    var data = await grist.docApi.fetchTable('ZGDU');
    var cols = Object.keys(data).filter(function(k){ return k !== 'id' && k !== 'manualSort'; });
    res.textContent = 'ZGDU lu : ' + cols.length + ' colonnes, ' + data[cols[0]].length + ' lignes.';
  } catch(e) {
    res.textContent = 'Erreur : ' + e.message;
  }
}
</script>
</body>
</html>
